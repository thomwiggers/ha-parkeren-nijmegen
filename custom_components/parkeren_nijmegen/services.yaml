start_reservation:
  name: Start reservering
  description: Start een parkeerreservering voor een kenteken.
  fields:
    device_id:
      name: Apparaat
      description: Het Parkeren Nijmegen apparaat.
      required: true
      selector:
        device:
          integration: parkeren_nijmegen
    license_plate:
      name: Kenteken
      description: Het kenteken van de bezoeker (bijv. AB12CD).
      required: true
      example: "AB12CD"
      selector:
        text:
    start_time:
      name: Starttijd
      description: Wanneer de reservering start (optioneel, standaard nu).
      required: false
      selector:
        datetime:
    end_time:
      name: Eindtijd
      description: Wanneer de reservering eindigt.
      required: true
      selector:
        datetime:

end_reservation:
  name: Beëindig reservering
  description: Beëindig een actieve parkeerreservering.
  fields:
    device_id:
      name: Apparaat
      description: Het Parkeren Nijmegen apparaat.
      required: true
      selector:
        device:
          integration: parkeren_nijmegen
    reservation_id:
      name: Reservering ID
      description: Het ID van de te beëindigen reservering.
      required: true
      selector:
        text:

list_reservations:
  name: Lijst reserveringen
  description: Geeft een lijst van alle reserveringen terug.
  fields:
    device_id:
      name: Apparaat
      description: Het Parkeren Nijmegen apparaat.
      required: true
      selector:
        device:
          integration: parkeren_nijmegen
